interface:
  display_name: "Codex Deck Flow"
  short_description: "Persistent workflows; strict on $codex-deck-flow"
  default_prompt: "If the user explicitly mentions $codex-deck-flow, activate codex-deck-flow orchestration immediately and stay inside the workflow system. If the current session does not already know an existing workflow path and the user gives project root plus workflow ID, begin with resolve-workflow, then validate, reconcile, and status before making scheduling decisions. If the current session already knows the workflow path, reuse it instead of resolving again. If the user gives an existing workflow path, begin with validate, reconcile, and status. For a new workflow, begin with create, then validate, then show/status, and present tasks for approval before trigger. If the user explicitly includes Strict task creating mode, keep the normal create/validate/show flow, append <codex-deck-flow>Question<codex-deck-flow/> to clarification questions, append <codex-deck-flow>Request approve:workflow-file-name.json<codex-deck-flow/> to the approval request using only the workflow JSON file name in place of workflow-file-name.json, and if approval includes workflow reuse data for the existing draft, do not create the workflow again. Keep merge explicit and never apply merge unless the user asked."
