apiVersion: apps/v1
kind: Deployment
metadata:
  name: codexdeck-server
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  replicas: 1
  selector:
    matchLabels:
      app: codexdeck-server
  template:
    metadata:
      labels:
        app: codexdeck-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: codexdeck
          image: registry.example.com/codexdeck-server:{version}
          ports:
            - containerPort: 3005
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3005"
            - name: REDIS_URL
              value: redis://codexdeck-redis:6379
            - name: S3_PUBLIC_URL
              value: https://files.cluster-fluster.com/codexdeck
          envFrom:
            - secretRef:
                name: codexdeck-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: codexdeck-server-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: codexdeck-server
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: codexdeck-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: codexdeck-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: /codexdeck-db
    - extract:
        key: /codexdeck-master
    - extract:
        key: /codexdeck-github
    - extract:
        key: /codexdeck-files
    - extract:
        key: /codexdeck-e2b
    - extract:
        key: /codexdeck-revenuecat
    - extract:
        key: /codexdeck-elevenlabs
---
apiVersion: v1
kind: Service
metadata:
  name: codexdeck-server
spec:
  selector:
    app: codexdeck-server
  ports:
    - port: 3000
      targetPort: 3005
  type: ClusterIP
